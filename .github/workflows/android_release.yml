name: Android CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_play:
        description: 'Upload to Google Play?'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare release keystore
        run: |
          test -n "${{ secrets.SIGNING_KEY }}"
          test -n "${{ secrets.ALIAS }}"
          test -n "${{ secrets.KEY_STORE_PASSWORD }}"
          test -n "${{ secrets.KEY_PASSWORD }}"
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build AAB
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release-keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew http:bundleRelease

      - name: Verify 16 KB native alignment
        run: bash scripts/check-16kb-alignment.sh

      - name: Verify bundle certificate
        run: |
          keytool -printcert -jarfile http/build/outputs/bundle/release/http-release.aab | tee /tmp/release-bundle-cert.txt
          if grep -q "Android Debug" /tmp/release-bundle-cert.txt; then
            echo "Release bundle is still signed with the Android Debug key." >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: http/build/outputs/bundle/release/http-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: http/build/outputs/bundle/release/http-release.aab
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Play Store
        if: ${{ github.event.inputs.upload_play || startsWith(github.ref, 'refs/tags/') }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: net.lifeupapp.lifeup.http
          releaseFiles: http/build/outputs/bundle/release/http-release.aab
          track: internal
          status: draft
